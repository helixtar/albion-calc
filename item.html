.ad-col{display:none!important}
@media(min-width:1200px){

function getTier(id){const m=id.match(/^T(\d)/);return m?parseInt(m[1]):4}
function getCat(id){
  if(id.includes('RUNE')||id.includes('SOUL')||id.includes('RELIC')||id.includes('SHARD'))return'Artifact';
  if(id.includes('ORE')||id.includes('WOOD')||id.includes('FIBER')||id.includes('HIDE')||id.includes('ROCK')||id.includes('METALBAR')||id.includes('PLANKS')||id.includes('CLOTH')||id.includes('LEATHER')||id.includes('STONEBLOCK'))return'Resource';

async function loadItem(){
  try{
    // URL-encode cities (Fort Sterling has space)
    const locStr=CITIES.map(c=>encodeURIComponent(c)).join(',');
    const API_DIRECT='https://west.albion-online-data.com/api/v2/stats/prices/'+itemId+'?locations='+locStr+'&qualities=1';
    const API_PROXY='https://corsproxy.io/?'+encodeURIComponent(API_DIRECT);
    let data=null, lastErr='';
    for(const tryUrl of [API_DIRECT, API_PROXY]){
      try{
        console.log('Trying:', tryUrl.substring(0,80)+'...');
        const r=await fetch(tryUrl);
        if(!r.ok){lastErr='HTTP '+r.status;continue;}
        const raw=await r.text();
        // corsproxy wraps response, handle both
        try{data=JSON.parse(raw);}catch(e){const m=JSON.parse(raw);data=m.contents?JSON.parse(m.contents):m;}
        if(data)break;
      }catch(e){lastErr=e.message;console.warn('Failed:',e.message);}
    }
    if(!data)throw new Error('API unreachable. Last error: '+lastErr+'. Check your internet connection.');

    // Build city map — API returns "city" field
    const cityMap={};
    CITIES.forEach(c=>cityMap[c]={sell:0,buy:0,date:null});
    data.forEach(d=>{
      const key=Object.keys(cityMap).find(c=>c.toLowerCase()===(d.city||'').toLowerCase());
      if(key)cityMap[key]={sell:d.sell_price_min||0,buy:d.buy_price_max||0,date:d.sell_price_min_date};
    });

    // Best sell / cheapest buy
    const entries=Object.entries(cityMap);
    const withSell=entries.filter(([,v])=>v.sell>0);
    const bestSell=withSell.length?withSell.reduce((a,b)=>b[1].sell>a[1].sell?b:a):null;
    const cheapBuy=withSell.length?withSell.reduce((a,b)=>(b[1].sell<a[1].sell&&b[1].sell>0)?b:a):null;
    const bestBuyOrder=entries.filter(([,v])=>v.buy>0).reduce((a,b)=>b[1].buy>a[1].buy?b:a,[null,{buy:0}]);

    let flipPct=0,flipProfit=0;
    if(bestSell&&cheapBuy&&cheapBuy[1].sell>0&&bestSell[1].sell>cheapBuy[1].sell){
      flipProfit=bestSell[1].sell-cheapBuy[1].sell;
      flipPct=Math.round((flipProfit/cheapBuy[1].sell)*100);
    }
    const isRainbow=flipPct>=70;

    const html=`
      <div class="item-hero">
        <div class="hero-icon">
          <img src="${ICON_BASE}/${itemId}.png?size=128&quality=1" alt="${itemName}" onerror="this.src='';this.style.display='none'"/>
        </div>
        <div class="hero-info">
          <div class="hero-name">${itemName}</div>
          <div class="hero-id">${itemId}</div>
          <div class="hero-tags">
            <span class="tag tag-tier" style="background:${tierCol};border-color:${tierCol}">TIER ${tier}</span>
            <span class="tag tag-cat">${getCat(itemId)}</span>
            ${isRainbow?'<span class="tag" style="background:transparent;animation:rainbow-border 2s linear infinite;border-width:1px">🌈 70%+ PROFIT</span>':''}
          </div>
          <div class="hero-best">
            <div class="best-card">
              <div class="best-label">Best Sell</div>
              <div class="best-val" style="color:var(--gold)">${bestSell?fmtS(bestSell[1].sell):'—'}</div>
              <div class="best-city">${bestSell?bestSell[0]:'No data'}</div>
            </div>
            <div class="best-card">
              <div class="best-label">Cheapest Buy</div>
              <div class="best-val">${cheapBuy?fmtS(cheapBuy[1].sell):'—'}</div>
              <div class="best-city">${cheapBuy?cheapBuy[0]:'No data'}</div>
            </div>
            <div class="best-card">
              <div class="best-label">Flip Margin</div>
              <div class="best-val" style="color:${flipPct>=30?'var(--green)':flipPct>0?'var(--tx)':'var(--tm)'}">${flipPct>0?'+'+flipPct+'%':'—'}</div>
              <div class="best-city">${flipPct>0?fmtFull(flipProfit):'No flip'}</div>
            </div>
          </div>
        </div>
      </div>

      ${flipPct>0?`
      <div class="flip-banner ${isRainbow?'rainbow':''}">
        <div class="flip-route">
          <div>
            <div style="font-family:var(--FM);font-size:10px;color:var(--td);margin-bottom:4px">BUY IN</div>
            ${cityChip(cheapBuy[0])}
          </div>
          <div class="flip-arrow">→</div>
          <div>
            <div style="font-family:var(--FM);font-size:10px;color:var(--td);margin-bottom:4px">SELL IN</div>
            ${cityChip(bestSell[0])}
          </div>
        </div>
        <div>
          <div style="font-family:var(--FM);font-size:11px;color:var(--td);margin-bottom:6px">POTENTIAL PROFIT</div>
          <div style="font-family:var(--FM);font-size:22px;font-weight:700;color:var(--green)">+${fmtS(flipProfit)}</div>
          <div style="font-family:var(--FM);font-size:11px;color:var(--td);margin-top:4px">+${flipPct}% return on investment</div>
        </div>
        ${isRainbow?`<div style="text-align:center">
          <div style="font-size:32px">🌈</div>
          <div style="font-family:var(--FM);font-size:10px;color:var(--gold);margin-top:4px">Rainbow Profit</div>
          <div style="font-family:var(--FM);font-size:10px;color:var(--td)">Investment +70% profitable</div>
        </div>`:''}
      </div>`:''}

      <div class="sec-label"><span>Prices by City</span></div>
      <div class="city-grid">
        <div class="city-row header">
          <div class="city-cell"><span class="hdr-label">City</span></div>
          <div class="city-cell"><span class="hdr-label">Sell Price (Min)</span></div>
          <div class="city-cell"><span class="hdr-label">Buy Order (Max)</span></div>
          <div class="city-cell"><span class="hdr-label">Flip Profit</span></div>
          <div class="city-cell"><span class="hdr-label">Last Updated</span></div>
        </div>
        ${CITIES.map(city=>{
          const v=cityMap[city];
          const col=CITY_COLORS[city];
          const isBest=bestSell&&bestSell[0]===city;
          const isCheap=cheapBuy&&cheapBuy[0]===city;
          let localFlip='';
          if(v.sell>0&&cheapBuy&&cheapBuy[0]!==city&&cheapBuy[1].sell>0){
            const lp=v.sell-cheapBuy[1].sell;
            const lpct=Math.round((lp/cheapBuy[1].sell)*100);
            if(lpct>0)localFlip=`<span class="profit-pct" style="color:${lpct>=70?'var(--green)':lpct>=30?'var(--green)':'var(--td)'}">+${lpct}%</span>`;
          }
          return `<div class="city-row${isBest?' best-row':''}">
            <div class="city-cell city-name"><span class="city-dot" style="background:${col}"></span>${city}
              ${isBest?'<span class="badge badge-gold" style="margin-left:4px">Best</span>':''}
              ${isCheap?'<span class="badge badge-blue" style="margin-left:4px">Cheapest</span>':''}
            </div>
            <div class="city-cell"><span class="price-sell${isBest?' price-best':v.sell>0?'':' price-na'}">${v.sell>0?fmtFull(v.sell):'No listing'}</span></div>
            <div class="city-cell"><span class="price-buy">${v.buy>0?fmtFull(v.buy):'—'}</span></div>
            <div class="city-cell profit-cell">${localFlip||'<span class="price-na">—</span>'}</div>
            <div class="city-cell updated-cell">${timeAgo(v.date)}</div>
          </div>`;
        }).join('')}
      </div>

      <div style="display:flex;gap:12px;justify-content:flex-start;margin-top:8px;flex-wrap:wrap">
        <a href="market.html" class="btn btn-outline">← Back to Market</a>
        <button class="btn btn-ghost" onclick="location.reload()">⟳ Refresh Prices</button>
      </div>
    `;

    document.getElementById('main-content').innerHTML=html;
    

  }catch(e){
    console.error('loadItem error:',e);
    document.getElementById('main-content').innerHTML=`<div class="loading-state">
      <div style="font-size:48px;margin-bottom:16px;opacity:.4">⚠</div>
      <p style="color:var(--td);font-family:var(--FM);margin-bottom:8px">Failed to load item data</p>
      <p style="color:var(--tm);font-family:var(--FM);font-size:10px;margin-bottom:16px;max-width:400px">${e.message}</p>
      <button onclick="loadItem()" style="padding:8px 20px;background:var(--s2);border:1px solid var(--bg-gold);border-radius:var(--r);color:var(--gold);cursor:pointer;font-family:var(--FM);font-size:12px">⟳ Retry</button>
    </div>`;
  }
}

// Add button styles inline
const style=document.createElement('style');
style.textContent=`.btn{font-family:var(--FT);font-size:11px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;padding:9px 20px;border-radius:var(--r);border:none;cursor:pointer;transition:all .2s;text-decoration:none;display:inline-flex;align-items:center;gap:8px}.btn-outline{background:transparent;color:var(--gold);border:1px solid var(--bg-gold)}.btn-outline:hover{background:rgba(200,162,83,.1)}.btn-ghost{background:var(--s2);color:var(--td);border:1px solid var(--bd)}.btn-ghost:hover{color:var(--tx);border-color:var(--bg-gold)}`;
document.head.appendChild(style);


loadItem();
</script>
</body>
</html>
